name: rumi_ishi_expense_tracker
description: "Rumi Ishi Expense Tracker - A modern, secure expense tracking app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0

  # State Management
  provider: ^6.1.2

  # UI & Animations
  lottie: ^3.1.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.69.2

  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  firebase_storage: ^12.3.6

  # Biometric Authentication
  local_auth: ^2.3.0

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  csv: ^6.0.0
  pdf: ^3.11.1
  path_provider: ^2.1.4
  share_plus: ^10.1.3
  shared_preferences: ^2.3.3
  url_launcher: ^6.2.5
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.jpg"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/logo.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
